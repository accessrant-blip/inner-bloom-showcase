<!doctype html>
<html lang="en" class="h-full">
  <head>
    <!-- Theme detection script - prevents flash -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    
    <!-- Google tag (gtag.js) - loaded on first user interaction for best performance -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      var gtmLoaded = false;
      function loadGTM() {
        if (gtmLoaded) return;
        gtmLoaded = true;
        gtag('js', new Date());
        gtag('config', 'G-EHWVX6CLJX');
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-EHWVX6CLJX';
        s.async = true;
        document.head.appendChild(s);
      }
      
      // Load GTM on first user interaction OR after 4s idle
      ['click', 'scroll', 'keydown', 'touchstart'].forEach(function(e) {
        document.addEventListener(e, loadGTM, { once: true, passive: true });
      });
      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() { setTimeout(loadGTM, 4000); });
      } else {
        setTimeout(loadGTM, 5000);
      }
    </script>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RantFree - Your Mental Health Wellness App | AI-Powered Support</title>
    <meta name="description" content="Transform your mental wellness journey with personalized tools, guided sessions, and professional support.">
    <meta name="author" content="RantFree" />
    <meta name="keywords" content="mental health, wellness app, therapy, mood tracking, meditation, anxiety relief, stress management, mental wellness">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://rantfree.in/" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rantfree.in/" />
    <meta property="og:site_name" content="RantFree" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="RantFree - Your Mental Health Wellness App | AI-Powered Support">
    <meta property="og:description" content="Transform your mental wellness journey with personalized tools, guided sessions, and professional support.">
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/PQFgJuUXvsPuAQTr0ZQ0cWJne1r2/social-images/social-1767530099292-rantfree-png.png">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RantFree Mental Health Wellness App" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rantfree_app" />
    <meta name="twitter:creator" content="@rantfree_app" />
    <meta name="twitter:title" content="RantFree - Your Mental Health Wellness App | AI-Powered Support">
    <meta name="twitter:description" content="Transform your mental wellness journey with personalized tools, guided sessions, and professional support.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/PQFgJuUXvsPuAQTr0ZQ0cWJne1r2/social-images/social-1767530099292-rantfree-png.png">
    
    <!-- Favicon and Touch Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.ico">
    
    <!-- Calendly widget assets - loaded non-render-blocking -->
    <link rel="preload" href="https://assets.calendly.com/assets/external/widget.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://assets.calendly.com/assets/external/widget.css"></noscript>
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#3E8E7E" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#3E8E7E" />

    <!-- Critical inline CSS for above-the-fold content (prevents render-blocking) -->
    <style>
      :root{--background:150 25% 98%;--foreground:150 15% 20%;--primary:150 40% 32%;--primary-foreground:0 0% 100%;--muted-foreground:150 12% 35%;--card:0 0% 100%;--border:150 15% 90%;--radius:0.75rem}
      .dark{--background:200 15% 10%;--foreground:150 10% 92%;--primary:150 35% 50%;--muted-foreground:150 10% 65%;--card:200 12% 14%;--border:200 10% 20%}
      *,::after,::before{box-sizing:border-box;border:0 solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:ui-sans-serif,system-ui,sans-serif,"Apple Color Emoji","Segoe UI Emoji"}
      body{margin:0;line-height:inherit;background-color:hsl(var(--background));color:hsl(var(--foreground))}
      .h-full{height:100%}
    </style>

    <!-- Async-load main stylesheet injected by Vite -->
    <script>
      (function(){
        var defined = false;
        new MutationObserver(function(mutations, obs){
          if(defined) return;
          var links = document.querySelectorAll('link[rel="stylesheet"][href*="/assets/"]');
          links.forEach(function(link){
            defined = true;
            link.media = 'print';
            link.onload = function(){ link.media = 'all'; };
          });
          if(defined) obs.disconnect();
        }).observe(document.head, {childList: true});
      })();
    </script>
  </head>

  <body class="h-full">
    <div id="root" class="h-full">
      <!-- Inline placeholder for faster FCP - replaced when React mounts -->
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--background,#fff);font-family:system-ui,sans-serif">
        <div style="text-align:center">
          <div style="font-size:1.5rem;font-weight:700;color:var(--foreground,#1a1a1a)">RantFree</div>
          <div style="margin-top:0.5rem;font-size:0.875rem;color:var(--muted-foreground,#666)">Loading your wellness space…</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
